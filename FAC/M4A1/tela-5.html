<div id="janela_1" class="jan">
	<div
		style="position: absolute;background-color: rgb(237, 235, 211);border-radius: 16px;padding: 30px 30px;display: flex;flex-direction: column;justify-content: center;width: 530px;align-items: center;">
		<img src="recursos/imgs/DAF_FITO_M3A4_RIM_ilustra02.png " style="width: 400px;">
		<img src="recursos/icones/DAF_FITO_M1A1_RIM_close.svg"
			style="position: absolute;top: 9px;right: 7px;width: 20px;">
	</div>
</div>
<script>
	$(() => {
		let janelas = $(document).find('[id^=janela]').css('cursor', 'pointer').click(apagarJanelas);
		let check = $(document).find('[id^=check]').hide();
		apagarJanelas();

		let botoes = $(document).find('[id^=botao]').css('cursor', 'pointer').map((index, botao) => {
			$(botao).click(() => {
				apagarJanelas();
				$(janelas[index]).fadeIn();
				$(check[index]).fadeIn();
				$(botao).css({ 'opacity': '1', 'border': '5px solid #edebd3' });
			})
		})
		function apagarJanelas() {
			janelas.map((index, janela) => {
				$(janela).hide();
			})
		}
	})
</script>
